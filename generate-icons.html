<!DOCTYPE html>
<html>
<head><title>Generate Sojourn Icons</title></head>
<body style="font-family:sans-serif;padding:32px;background:#f5f5f0">
<h2>Sojourn Icon Generator</h2>
<p>Click each button to download the icon. Then save both files into your sojourn folder.</p>
<div style="display:flex;gap:24px;margin:24px 0;align-items:flex-end">
  <div><canvas id="c512" width="512" height="512"></canvas><br><button onclick="dl('c512','icon-512.png')" style="margin-top:8px;padding:8px 16px">Download icon-512.png</button></div>
  <div><canvas id="c192" width="192" height="192" style="width:192px;height:192px"></canvas><br><button onclick="dl('c192','icon-192.png')" style="margin-top:8px;padding:8px 16px">Download icon-192.png</button></div>
</div>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.18; // corner radius

  // Background rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#4D6B53';
  ctx.fill();

  // Route dots and line
  const cx = s / 2;
  const dotR = s * 0.045;
  const lineW = s * 0.035;
  const top = s * 0.22;
  const bot = s * 0.78;
  const mid = s * 0.5;
  const offX = s * 0.14;

  // Curved route line (S-curve)
  ctx.beginPath();
  ctx.moveTo(cx - offX, top);
  ctx.bezierCurveTo(cx + offX * 2, top + (bot - top) * 0.3,
                    cx - offX * 2, top + (bot - top) * 0.6,
                    cx + offX, bot);
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Start dot (filled)
  ctx.beginPath();
  ctx.arc(cx - offX, top, dotR, 0, Math.PI * 2);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();

  // End dot (filled)
  ctx.beginPath();
  ctx.arc(cx + offX, bot, dotR * 1.3, 0, Math.PI * 2);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();

  // Middle waypoint dot
  ctx.beginPath();
  ctx.arc(cx, mid, dotR * 0.8, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fill();
}

drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c192'));

function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
